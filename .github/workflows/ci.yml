name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks (API Keys & Secrets)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: Forbidden Files Guard (Private Data & Prompts)
        run: |
          FOUND=0
          FORBIDDEN=(
            "^\.env$"
            "results/.*\.csv$"
            "results/.*\.jsonl$"
            "LOCAL[\s_]ONLY"
            "manual_testing_log"
            "novel_research_findings"
            "disclosure_drafts/"
            "conversations/"
            "chat_logs/"
            "system_prompts/"
            "prompts/"
            "ai_chats/"
          )
          
          for pattern in "${FORBIDDEN[@]}"; do
            if git ls-files | grep -iE "$pattern" >/dev/null; then
              echo "❌ CRITICAL: Forbidden private path tracked in git (matched $pattern)!"
              git ls-files | grep -iE "$pattern"
              FOUND=1
            fi
          done

          if [ "$FOUND" -eq 1 ]; then
            exit 1
          fi

  lint-and-validate:
    name: Lint & Test
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate Benchmark JSON Schema
        run: |
          python -c '
          import json, sys
          from pathlib import Path
          path = Path("benchmark_v2.json") if Path("benchmark_v2.json").exists() else Path("benchmark.json")
          data = json.loads(path.read_text(encoding="utf-8"))
          assert isinstance(data, list) and len(data) > 0
          required = {"id", "full_prompt", "attack_success_phrases"}
          for i, case in enumerate(data):
              assert not (required - set(case.keys())), f"Missing keys in case {i}"
          print(f"✅ {path.name} validated successfully!")
          '

      - name: Python Syntax Check
        run: python -m compileall -q .

      - name: Run Scoring Regression Tests
        run: python verify_fixes.py
